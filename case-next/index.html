<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Redirecionando…</title>
    <meta name="robots" content="noindex" />
    <script>
      // /case-next/ is the old preview path; the viewer now lives at /case/.
      // Forward query params verbatim so ?id=... and any future flags survive.
      // `replace` keeps the old URL out of history.
      window.location.replace("../case/" + window.location.search + window.location.hash);
    </script>
    <noscript>
      <meta http-equiv="refresh" content="0; url=../case/" />
    </noscript>
  </head>
  <body>
    <p>Redirecionando para <a href="../case/">/case/</a>…</p>
  </body>
</html>
